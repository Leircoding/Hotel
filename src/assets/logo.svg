<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Green border -->
  <rect x="30" y="30" width="240" height="240" fill="none" stroke="#2d5016" stroke-width="4" rx="8"/>
  
  <!-- Heart shape outline in black -->
  <path d="M 100 90 Q 100 70 115 70 Q 130 70 150 85 Q 170 70 185 70 Q 200 70 200 90 Q 200 110 150 155 Q 100 110 100 90 Z" 
        fill="none" stroke="#000" stroke-width="3" stroke-linejoin="round"/>
  
  <!-- Bow tie at top -->
  <g>
    <!-- Left bow -->
    <ellipse cx="110" cy="60" rx="18" ry="12" fill="#1a1a1a" transform="rotate(-25 110 60)"/>
    <!-- Right bow -->
    <ellipse cx="190" cy="60" rx="18" ry="12" fill="#1a1a1a" transform="rotate(25 190 60)"/>
    <!-- Bow knot center -->
    <circle cx="150" cy="65" r="6" fill="#2d7a2e"/>
  </g>
  
  <!-- Dollar sign in gold -->
  <text x="150" y="155" font-size="90" font-weight="bold" text-anchor="middle" fill="#d4af37" font-family="Arial, sans-serif">$</text>
  
  <!-- Dollar sign decorative dots -->
  <circle cx="145" cy="110" r="3" fill="#d4af37"/>
  <circle cx="155" cy="110" r="3" fill="#d4af37"/>
  <circle cx="145" cy="150" r="3" fill="#d4af37"/>
  <circle cx="155" cy="150" r="3" fill="#d4af37"/>
</svg>